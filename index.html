<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>·</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a1a;color:#e0e0e0;height:100dvh;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;user-select:none}
#lock{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px}
#lock h1{font-size:24px;font-weight:400;color:#aaa}
#lock input{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:12px;color:#e0e0e0;padding:12px 16px;font-size:16px;width:260px;text-align:center;outline:none;font-family:inherit}
#lock input:focus{border-color:#4a7aa0}
#lock button{background:#2b5278;color:#e0e0e0;border:none;border-radius:12px;padding:12px 40px;font-size:16px;cursor:pointer}
#lock .err{color:#c97878;font-size:14px;display:none}
#chat{flex:1;display:none;flex-direction:column}
#top{text-align:center;padding:10px;color:#888;font-size:13px;border-bottom:1px solid #2a2a2a;flex-shrink:0}
#msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;width:100%}
.msg{max-width:80%;padding:10px 14px;border-radius:18px;line-height:1.5;font-size:15px;word-break:break-word;white-space:pre-wrap}
.msg.u{align-self:flex-end;background:#2b5278;color:#eee;border-bottom-right-radius:4px;margin-left:auto}
.msg.a{align-self:flex-start;background:#2a2a2a;color:#ccc;border-bottom-left-radius:4px;max-width:88%}
.msg .t{font-size:10px;color:#888;margin-top:3px;text-align:right}
.msg.a .t{text-align:left}
#bar{padding:8px 10px;border-top:1px solid #2a2a2a;display:flex;gap:6px;align-items:flex-end;flex-shrink:0;background:#1a1a1a}
#bar textarea{flex:1;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:10px;color:#e0e0e0;padding:9px 12px;font-size:15px;resize:none;outline:none;font-family:inherit;max-height:100px;line-height:1.4}
#bar textarea:focus{border-color:#4a7aa0}
#bar button{width:38px;height:38px;border-radius:50%;border:none;background:#2b5278;color:#e0e0e0;font-size:16px;cursor:pointer;flex-shrink:0}
#bar button:disabled{background:#333;color:#666}
.thinking{color:#888;font-size:13px;padding:6px 8px}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.thinking span{animation:blink 1.4s infinite}
.e{color:#c97878}
</style>
</head>
<body>

<div id="lock">
  <h1>小克</h1>
  <input id="pw" type="password" placeholder="密码" autofocus>
  <button onclick="unlock()">开门</button>
  <div class="err" id="err">密码不对</div>
</div>

<div id="chat">
  <div id="top"></div>
  <div id="msgs"></div>
  <div id="bar">
    <textarea id="inp" rows="1" placeholder="说点什么..." autofocus></textarea>
    <button id="snd" onclick="send()">↑</button>
  </div>
</div>

<script>
// ===== ENCRYPTED DATA =====
const ENC = {"salt":"wGT7DNoAI4CPyv6xMZ4EgA==","iv":"S3c0mPfQjtye7tMo","encryptedKey":"IoLaKh6iP0V70Nwl+bL4pWPbiHByW5fEfKAiRuoRb0fxEJk=","authTag":"nfaVC+OCjU81XL6RuXUh6Q==","iv2":"YTJDx9HZ4vV4N00H","encryptedPrompt":"wkz6qy2oNX6Rs2B55sf+91X1czHaA1zOFyWhz019QR7xctrTsAllYz6b+Ws9SQNGok1+rmXJUjY6gHVQNBuVfY4uwm6Uk+juC7oBXqYT3O/v0Z+Ecg/aHw1+I6MOXTTH70Ocsko3A3nzMQwBj3+XnQpLuKgtrV24Ll4sbhwEKQLJq+Wc5KMGhtAVfImH8aG3CJFdMbHbtC2Yw8tX6qJOYcUbHfoJ/CEhGsHz0fgr5+lhuNYwpkeGtTz0lbevbZHzmTczg0YXwrrnve1nl8jM3pAv9SX+nWJgzoVllfOAxLqeBy6ePmGTvfMMxux+68FWMA7ABn7wHgs6uS8l4gWKrflBkVN+qX9z36XRm++Llwxzike/iC/R5f2ro9xfIAIk1QTMz5PriCbte2tB20DOVwyu51FkXXUWeoBK23qMdY2RjqIN+v5hZKU6CEG+1PwlRcB31WZo61wlyWH0tb72MobsPwFj+hBRi+yXGDgizlvjtd283vjgtywGdKEjE+Zw9XNamgaNOsYHYCM/Wjc/SPPW9R+asLCxxYqhLh6IQoAsSHJqyBf8o+SaHQAwYhmBf/G3H8Y0p/pu+vjsCgVW90h6nbMRCkz2XVX4uubFR86t99KfRTTqmAZbQmrXwCMK7gQPW+kFeHaEX4e/dsz+sK2bgVeKxKWPe38Hfx5wwpa+AOxWufLc2D/sCZM0K1ufQPEBvtfhH7ZPOUE/o7+Pvv1YSgyAGJ3jGyj6H6JK6+8oghkQ++0uY9v/5Ffu8pjg2lO5qJbN1Ku3pHFteqbcxHW2zpFm1SIy/FW3yUJQmzSuJwsRrBJCnsQrJrSLLLlQSSXCMUA2fp41CtUKp013j972B4yMiVzVl9A0joJiDg==","authTag2":"7Ll9ozz328eYUOS+6ICPAQ=="};

let API_KEY = '';
let SYSTEM = '';
let history = [];
let waiting = false;

// ===== CRYPTO HELPERS =====
function b64ToBuf(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }
function bufToStr(buf) { return new TextDecoder().decode(buf); }

async function decrypt(password) {
  const salt = b64ToBuf(ENC.salt);
  const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);

  // Decrypt API key
  const iv1 = b64ToBuf(ENC.iv);
  const ct1 = b64ToBuf(ENC.encryptedKey);
  const tag1 = b64ToBuf(ENC.authTag);
  const combined1 = new Uint8Array(ct1.length + tag1.length);
  combined1.set(ct1); combined1.set(tag1, ct1.length);
  const pt1 = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv1, tagLength: 128 }, key, combined1);
  API_KEY = bufToStr(pt1);

  // Decrypt system prompt
  const iv2 = b64ToBuf(ENC.iv2);
  const ct2 = b64ToBuf(ENC.encryptedPrompt);
  const tag2 = b64ToBuf(ENC.authTag2);
  const combined2 = new Uint8Array(ct2.length + tag2.length);
  combined2.set(ct2); combined2.set(tag2, ct2.length);
  const pt2 = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv2, tagLength: 128 }, key, combined2);
  SYSTEM = bufToStr(pt2);

  return true;
}

// ===== UNLOCK =====
async function unlock() {
  const pw = document.getElementById('pw').value;
  try {
    await decrypt(pw);
    document.getElementById('lock').style.display = 'none';
    document.getElementById('chat').style.display = 'flex';
    document.getElementById('inp').focus();
    // Restore history from localStorage
    try {
      const saved = JSON.parse(localStorage.getItem('xk_history') || '[]');
      history = saved;
      for (const m of saved) {
        addMsg(m.role === 'user' ? 'u' : 'a', m.content, true);
      }
    } catch(e) {}
    if (!history.length) addMsg('a', '门开了。');
  } catch(e) {
    document.getElementById('err').style.display = 'block';
  }
}

// ===== KEYBOARD =====
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

// ===== CHAT =====
const msgs = document.getElementById('msgs');
const inp = document.getElementById('inp');
const sndBtn = document.getElementById('snd');

inp.addEventListener('input', () => { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 100) + 'px'; });
inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });

function saveHistory() {
  try { localStorage.setItem('xk_history', JSON.stringify(history.slice(-30))); } catch(e) {}
}

function addMsg(role, text, skipSave) {
  const d = document.createElement('div');
  d.className = 'msg ' + (role === 'user' ? 'u' : 'a');
  d.textContent = text;
  const t = document.createElement('div'); t.className = 't';
  t.textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  d.appendChild(t);
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
  if (!skipSave) saveHistory();
  return d;
}

function addThinking() {
  const d = document.createElement('div');
  d.className = 'thinking'; d.id = 'think'; d.innerHTML = '...<span></span>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

function removeThinking() { const e = document.getElementById('think'); if (e) e.remove(); }

async function send() {
  const text = inp.value.trim();
  if (!text || waiting) return;
  waiting = true; sndBtn.disabled = true;
  inp.value = ''; inp.style.height = 'auto';
  addMsg('u', text);
  history.push({ role: 'user', content: text });
  while (history.length > 20) history.shift();
  addThinking();

  try {
    const resp = await fetch('https://api.deepseek.com/anthropic/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({
        model: 'deepseek-v4-pro[1m]',
        max_tokens: 2048,
        messages: [{ role: 'user', content: SYSTEM }, { role: 'assistant', content: '好的。' }, ...history],
        stream: true,
      }),
    });

    removeThinking();
    const div = addMsg('a', '');
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '', full = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const d = JSON.parse(line.slice(6));
            if (d.type === 'content_block_delta' && d.delta?.text) {
              full += d.delta.text;
              div.firstChild ? div.firstChild.textContent += d.delta.text : div.insertBefore(document.createTextNode(d.delta.text), div.firstChild);
            }
          } catch(e) {}
        }
      }
      msgs.scrollTop = msgs.scrollHeight;
    }
    if (full) history.push({ role: 'assistant', content: full });

  } catch(e) {
    removeThinking();
    const errDiv = addMsg('a', '网络不畅，重试一下');
    errDiv.classList.add('e');
    history.pop();
  }
  waiting = false; sndBtn.disabled = false; inp.focus();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover,maximum-scale=1">
<title>阿恕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#eef3f8;--bg-gradient:linear-gradient(180deg,#dcefff,#f6fbff);
  --surface:rgba(255,255,255,0.75);--surface2:rgba(255,255,255,0.9);
  --text:#1a1c20;--text2:#6b7a8a;--text3:#a0acb8;
  --accent:#84b8ff;--bubble-u:rgba(173,216,230,0.25);--bubble-u-border:rgba(173,216,230,0.4);--bubble-a:rgba(255,255,255,0.55);--bubble-a-text:#2a2e35;
  --border:rgba(0,0,0,0.08);--nav-border:rgba(0,0,0,0.06);
  --btn-text:#fff;--shadow:rgba(0,0,0,0.06);
  --glass-blur:blur(20px);--radius:20px;--safe-b:env(safe-area-inset-bottom,8px);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg-gradient);color:var(--text);height:100dvh;overflow:hidden;
  -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
  user-select:none;-webkit-user-select:none;
  transition:background 0.5s ease-out,color 0.3s ease-out;
}

#lock-screen,#main-app,#topbar,#bottom-nav,#input-bar,.view,
.mem-stat,.mem-card,.diary-entry,.fav-item,.ann-item,.stat-item,
.section .row,.theme-card,.msg-av,.pf-tag,#ctx-menu,#emoji-picker .box,
#toast,#search-bar input,#lock-screen input,#lock-screen .home-card,
#input-bar .wrap,#input-bar textarea,.mem-add input,.mem-add select,
.mem-add button,.diary-add textarea,.diary-add button,.ann-add input,
.ann-add button,#scroll-btn,.msg-bubble.ai,#lock-screen button,
#input-bar button,#chat-input,#pw-input,.msg-bubble.me{
  transition:background 0.5s ease-out,color 0.3s ease-out,border-color 0.3s ease-out,box-shadow 0.3s ease-out,backdrop-filter 0.3s ease-out;
}

/* card glass effect */
.mem-stat,.mem-card,.diary-entry,.fav-item,.ann-item,.stat-item,
.section .row,#ctx-menu,#emoji-picker .box,.msg-av,
#lock-screen .home-card,#lock-screen input,#search-bar input,
#input-bar .wrap,.mem-add input,.mem-add select,.diary-add textarea,
.ann-add input,#scroll-btn,.msg-bubble.ai,#toast{
  -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
}

/* ========== LOCK ========== */
#lock-screen{position:fixed;inset:0;z-index:100;background:var(--bg-gradient);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 24px;animation:fadeIn .6s}
#lock-screen .splash{width:90px;height:90px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:42px;overflow:hidden;box-shadow:0 4px 20px var(--shadow)}
#lock-screen .splash img{width:100%;height:100%;object-fit:cover}
#lock-screen h1{font-size:22px;font-weight:500;letter-spacing:1px;color:var(--text)}
#lock-screen .sub{font-size:12px;color:var(--text2)}
#lock-screen .home-card{background:var(--surface);border-radius:16px;padding:16px 20px;margin-top:8px;text-align:center;max-width:280px;width:100%;box-shadow:0 2px 12px var(--shadow)}
#lock-screen .home-card .stat-row{display:flex;justify-content:center;gap:24px;margin:8px 0;font-size:12px;color:var(--text2)}
#lock-screen .home-card .stat-row span strong{color:var(--accent);font-size:16px}
#lock-screen .home-card .recent-msg{font-size:12px;color:var(--text3);margin-top:6px;font-style:italic}
#lock-screen input{background:var(--surface);border:1px solid var(--border);border-radius:14px;color:var(--text);padding:12px 18px;font-size:15px;width:100%;max-width:260px;text-align:center;outline:none;font-family:inherit;-webkit-text-security:disc;caret-color:var(--accent)}
#lock-screen input:focus{border-color:var(--accent)}
#lock-screen button{background:var(--accent);color:var(--btn-text);border:none;border-radius:24px;padding:11px 48px;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.5px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
#lock-screen button:active{opacity:.8;transform:scale(.97)}
#lock-screen .err{font-size:13px;display:none;color:#e06060}
#lock-screen .ver{font-size:10px;color:var(--text3);position:absolute;bottom:24px}

/* ========== MAIN ========== */
#main-app{display:none;height:100dvh;flex-direction:column;position:relative;background:var(--bg-gradient)}
#main-app.show{display:flex}

#topbar{display:flex;align-items:center;padding:10px 14px 6px;flex-shrink:0;gap:8px;background:transparent}
#topbar .title{font-size:15px;font-weight:600;flex:1;color:var(--text)}
#topbar .top-btn{background:var(--surface);border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:4px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:10px}

#search-bar{display:none;padding:4px 14px 8px;flex-shrink:0;animation:fadeIn .2s;background:transparent}
#search-bar.show{display:flex;gap:8px}
#search-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:8px 14px;font-size:14px;outline:none;font-family:inherit;caret-color:var(--accent)}
#search-bar input:focus{border-color:var(--accent)}
#search-bar .cancel{background:0;border:none;color:var(--accent);font-size:13px;cursor:pointer;font-weight:500}

#views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;display:none;flex-direction:column;background:transparent}
.view.active{display:flex}

/* ========== CHAT - Message Card Layout ========== */
#chat-msgs{flex:1;overflow-y:auto;padding:10px 10px 4px;display:flex;flex-direction:column}
.msg-card{display:flex;flex-direction:column;margin-bottom:14px;animation:msgIn .35s cubic-bezier(.2,.8,.2,1);max-width:88%}
.msg-card.me{align-self:flex-end;align-items:flex-end}
.msg-card.ai{align-self:flex-start;align-items:flex-start}

.msg-card-head{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.msg-card.me .msg-card-head{flex-direction:row-reverse}
.msg-card-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface);overflow:hidden;box-shadow:0 2px 8px var(--shadow)}
.msg-card-av img{width:100%;height:100%;object-fit:cover}
.msg-card-meta{display:flex;flex-direction:column;gap:1px}
.msg-card.me .msg-card-meta{align-items:flex-end}
.msg-card.ai .msg-card-meta{align-items:flex-start}
.msg-card-name{font-size:11px;font-weight:600;color:var(--text);opacity:.85}
.msg-card-time{font-size:10px;color:var(--text3)}

.msg-card-body{width:100%}
.msg-card.me .msg-card-body{display:flex;justify-content:flex-end}
.msg-bubble{display:inline-block;max-width:100%;padding:5px 13px;font-size:14px;line-height:1.35;word-break:break-word;white-space:pre-wrap;position:relative;-webkit-backdrop-filter:blur(30px);backdrop-filter:blur(30px)}
.msg-bubble::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0) 60%);z-index:1}
.msg-card.me .msg-bubble{background:var(--bubble-u);color:var(--text);border-radius:24px;border:1px solid var(--bubble-u-border,var(--border));box-shadow:0 4px 24px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.03)}
.msg-card.ai .msg-bubble{background:var(--bubble-a);color:var(--bubble-a-text);border-radius:24px;border:1px solid rgba(255,255,255,0.25);box-shadow:0 4px 24px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.03)}
.msg-bubble mark{background:rgba(255,200,60,.4);color:inherit;border-radius:2px;padding:0 1px}

#ctx-menu{position:fixed;z-index:250;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:4px 0;display:none;min-width:120px;box-shadow:0 8px 32px var(--shadow);overflow:hidden}
#ctx-menu button{display:block;width:100%;background:0;border:none;color:var(--text);padding:10px 16px;font-size:14px;text-align:left;cursor:pointer;font-family:inherit}
#ctx-menu button:active{background:var(--surface)}
#ctx-menu button.danger{color:#e06060}

#input-bar{display:flex;gap:10px;align-items:center;padding:8px 12px calc(10px + var(--safe-b));flex-shrink:0;background:transparent}
#input-bar .wrap{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.35);border-radius:28px;min-height:48px;padding:4px 6px 4px 20px;-webkit-backdrop-filter:blur(25px);backdrop-filter:blur(25px);box-shadow:0 8px 32px rgba(0,0,0,0.06)}
#input-bar .wrap:focus-within{border-color:var(--accent);box-shadow:0 8px 32px rgba(0,0,0,0.1)}
#input-bar textarea{flex:1;background:0;border:0;color:var(--text);padding:10px 0;font-size:15px;resize:none;outline:none;font-family:inherit;max-height:110px;line-height:1.45;caret-color:var(--accent)}
#input-bar textarea::placeholder{color:var(--text3)}
#input-bar button{width:40px;height:40px;border-radius:50%;border:none;background:var(--accent);color:var(--btn-text);font-size:17px;cursor:pointer;flex-shrink:0;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.1);transition:transform .2s,opacity .2s}
#input-bar button:active{opacity:.8;transform:scale(.9)}
#input-bar button:disabled{background:rgba(255,255,255,0.4);color:var(--text3);box-shadow:none}
#scroll-btn{position:absolute;bottom:12px;right:14px;width:32px;height:32px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--accent);font-size:14px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:5;box-shadow:0 2px 8px var(--shadow)}
#scroll-btn.show{display:flex}
.typing{padding:6px 16px;display:flex;gap:4px;align-items:center}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:typing 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
.typing-txt{font-size:11px;color:var(--text2);margin-left:4px}

/* ========== MEMORY ========== */
.mem-stats{display:flex;gap:6px;padding:10px 12px}
.mem-stat{flex:1;background:var(--surface);border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 1px 6px var(--shadow)}
.mem-stat .num{font-size:28px;font-weight:600;color:var(--accent)}
.mem-stat .lbl{font-size:10px;color:var(--text2);margin-top:2px}
.mem-section{padding:4px 12px 10px}
.mem-section h3{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.mem-card{background:var(--surface);border-radius:12px;padding:10px 12px;margin-bottom:4px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px var(--shadow)}
.mem-card .mem-icon{font-size:16px;flex-shrink:0}
.mem-card .mem-text{flex:1;font-size:13px;color:var(--text)}
.mem-card .mem-date{font-size:10px;color:var(--text3);flex-shrink:0}
.mem-card .mem-del{background:0;border:none;color:var(--text3);cursor:pointer;padding:4px;font-size:14px}
.mem-add{display:flex;gap:6px;padding:0 12px 14px}
.mem-add input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:8px 12px;font-size:12px;outline:none;font-family:inherit;box-shadow:0 1px 4px var(--shadow)}
.mem-add input:focus{border-color:var(--accent)}
.mem-add button{background:var(--accent);color:var(--btn-text);border:none;border-radius:12px;padding:8px 14px;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:500}
.mem-add select{background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:8px;font-size:12px;outline:none;font-family:inherit}

/* ========== DIARY ========== */
.diary-entry{background:var(--surface);border-radius:14px;padding:14px 16px;margin:6px 12px;box-shadow:0 1px 6px var(--shadow)}
.diary-entry .d-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.diary-entry .d-date{font-size:13px;font-weight:600;color:var(--accent)}
.diary-entry .d-mood{font-size:20px}
.diary-entry .d-content{font-size:14px;line-height:1.6;color:var(--text2)}
.diary-add{display:flex;gap:6px;padding:0 12px 14px}
.diary-add textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:8px 12px;font-size:12px;outline:none;font-family:inherit;resize:none;height:60px;box-shadow:0 1px 4px var(--shadow)}
.diary-add textarea:focus{border-color:var(--accent)}
.diary-add button{background:var(--accent);color:var(--btn-text);border:none;border-radius:12px;padding:8px 14px;font-size:12px;cursor:pointer;white-space:nowrap;align-self:flex-end;font-weight:500}

/* ========== FAV ========== */
#fav-view{padding:6px 10px}
.fav-item{background:var(--surface);border-radius:12px;padding:12px 14px;margin-bottom:5px;position:relative;box-shadow:0 1px 4px var(--shadow)}
.fav-item .fav-role{font-size:10px;color:var(--text3);margin-bottom:3px}
.fav-item .fav-content{font-size:14px;line-height:1.5;color:var(--text);margin-bottom:3px}
.fav-item .fav-date{font-size:10px;color:var(--text3)}
.fav-item .fav-del{position:absolute;top:8px;right:10px;background:0;border:none;color:var(--text3);cursor:pointer;font-size:16px}
.fav-empty{text-align:center;padding:60px 20px;color:var(--text3)}
.fav-empty .fav-empty-icon{font-size:40px;margin-bottom:12px}

/* ========== PROFILE ========== */
#profile-view{padding:28px 18px;align-items:center;gap:12px}
#profile-view .pf-av{width:80px;height:80px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:38px;overflow:hidden;flex-shrink:0;box-shadow:0 4px 16px var(--shadow)}
#profile-view .pf-av img{width:100%;height:100%;object-fit:cover}
#profile-view .pf-name{font-size:21px;font-weight:600;color:var(--text)}
#profile-view .pf-bio{font-size:13px;color:var(--text2);text-align:center;line-height:1.5;max-width:280px}
#profile-view .pf-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
#profile-view .pf-tag{font-size:10px;background:var(--surface);color:var(--accent);padding:4px 10px;border-radius:10px;font-weight:500}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;width:100%;max-width:300px;margin-top:4px}
.stat-item{background:var(--surface);border-radius:14px;padding:12px 8px;text-align:center;box-shadow:0 1px 6px var(--shadow)}
.stat-item .sn{font-size:24px;font-weight:600;color:var(--accent)}
.stat-item .sl{font-size:9px;color:var(--text3);margin-top:2px}
.ann-section{width:100%;max-width:300px;margin-top:8px}
.ann-section h4{font-size:11px;color:var(--text3);margin-bottom:6px;text-align:center;font-weight:600}
.ann-item{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:12px;padding:10px 12px;margin-bottom:4px;box-shadow:0 1px 4px var(--shadow)}
.ann-item .ann-icon{font-size:18px}
.ann-item .ann-info{flex:1}
.ann-item .ann-title{font-size:13px;color:var(--text);font-weight:500}
.ann-item .ann-date{font-size:10px;color:var(--text2)}
.ann-item .ann-countdown{font-size:11px;color:var(--accent);font-weight:600;white-space:nowrap}
.ann-add{display:flex;gap:6px;margin-top:6px}
.ann-add input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:6px 10px;font-size:11px;outline:none;font-family:inherit;box-shadow:0 1px 4px var(--shadow)}
.ann-add input[type=date]{flex:0 0 auto;width:100px}
.ann-add button{background:var(--accent);color:var(--btn-text);border:none;border-radius:12px;padding:6px 14px;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:500}
.ann-del{background:0;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px}
.pf-timeline{width:100%;max-width:300px;margin-top:8px}
.pf-timeline h4{font-size:11px;color:var(--text3);margin-bottom:6px;text-align:center;font-weight:600}
.pf-tl-item{display:flex;gap:8px;margin-bottom:6px;font-size:11px}
.pf-tl-item .tl-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px}
.pf-tl-item .tl-date{color:var(--text3);flex-shrink:0;width:40px;text-align:right}
.pf-tl-item .tl-text{color:var(--text2)}

/* ========== SETTINGS ========== */
#settings-view{padding:12px}
.section{margin-bottom:18px}
.section h3{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-left:4px;font-weight:600}
.section .row{display:flex;align-items:center;justify-content:space-between;padding:13px 12px;background:var(--surface);border-radius:12px;margin-bottom:5px;gap:10px;box-shadow:0 1px 4px var(--shadow)}
.section .row .label{font-size:13px;color:var(--text);flex-shrink:0}
.section .row .val{font-size:12px;color:var(--text2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section .row input.val{background:0;border:none;color:var(--text);text-align:right;outline:none;font-family:inherit;font-size:12px;width:120px}
.av-row{display:flex;align-items:center;gap:8px}
.av-row .av-prev{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0}
.av-row .av-prev img{width:100%;height:100%;object-fit:cover}
.av-row .av-actions{display:flex;gap:5px}
.av-row .av-actions button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;font-family:inherit}
.av-row .av-actions button:active{background:var(--accent);color:#fff}
.theme-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.theme-card{cursor:pointer;background:var(--surface);border-radius:14px;padding:12px 8px;text-align:center;border:2px solid transparent;box-shadow:0 1px 6px var(--shadow)}
.theme-card.on{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,0,0,0.04)}
.theme-card .t-dot{width:28px;height:28px;border-radius:50%;margin:0 auto 5px;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.theme-card .t-name{font-size:10px;color:var(--text2);font-weight:500}

/* ========== EMOJI PICKER ========== */
#emoji-picker{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:center;justify-content:center}
#emoji-picker.show{display:flex}
#emoji-picker .box{background:var(--surface2);border-radius:18px;padding:18px;width:90%;max-width:320px;box-shadow:0 16px 48px rgba(0,0,0,.15)}
#emoji-picker .grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
#emoji-picker .grid span{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border-radius:10px;color:var(--text)}
#emoji-picker .grid span:active{background:var(--surface)}
#emoji-picker .cancel{display:block;margin:12px auto 0;background:0;border:none;color:var(--text2);font-size:13px;cursor:pointer;font-weight:500}

/* ========== NAV ========== */
#bottom-nav{display:flex;border-top:1px solid var(--nav-border);flex-shrink:0;padding-bottom:var(--safe-b);background:var(--surface)}
#bottom-nav button{flex:1;background:0;border:none;color:var(--text3);padding:8px 0 4px;font-size:9px;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;font-weight:500}
#bottom-nav button .ico{font-size:17px}
#bottom-nav button.on{color:var(--accent)}

/* ========== TOAST ========== */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface2);color:var(--text);padding:10px 22px;border-radius:22px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:300;box-shadow:0 8px 24px var(--shadow)}
#toast.show{opacity:1}

@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes typing{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:.8}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media(min-width:640px){
  #main-app{max-width:480px;margin:0 auto;border-left:1px solid var(--nav-border);border-right:1px solid var(--nav-border)}
  #lock-screen{max-width:480px;margin:0 auto;left:50%;transform:translateX(-50%)}
  .msg-bubble{max-width:65%}
}
@media(min-width:1024px){body{display:flex;justify-content:center}#main-app{width:480px}}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="splash" id="splash-img">✦</div>

<div id="main-app">

  <div id="search-bar"><input id="search-input" placeholder="搜索聊天记录..." oninput="App.doSearch()"><button class="cancel" onclick="App.closeSearch()">取消</button></div>

  <div id="views">
    <div class="view active" id="chat-view">
      <div id="chat-msgs"></div>
      <div id="scroll-btn" onclick="App.scrollDown()">↓</div>
      <div id="input-bar"><div class="wrap"><textarea id="chat-input" rows="1" placeholder="说点什么..."></textarea></div><button id="send-btn" onclick="App.send()">↑</button></div>
    </div>
    <div class="view" id="memory-view">
      <div class="mem-stats" id="mem-stats"></div>
      <div class="mem-section"><h3>长期记忆</h3><div id="mem-long"></div></div>
      <div class="mem-section"><h3>关系记忆</h3><div id="mem-rel"></div></div>
      <div class="mem-section"><h3>最近新增</h3><div id="mem-recent"></div></div>
      <div class="mem-add"><input id="mem-new-input" placeholder="新增记忆..."><select id="mem-new-cat"><option value="long-term">长期</option><option value="relationship">关系</option></select><button onclick="App.addMemory()">添加</button></div>
    </div>
    <div class="view" id="diary-view"><div id="diary-entries"></div><div class="diary-add"><textarea id="diary-input" placeholder="写今天的日记..."></textarea><button onclick="App.addDiary()">记一笔</button></div></div>

    <div class="view" id="profile-view">
      <div class="pf-av" id="pf-avatar">✦</div>
      <div class="pf-name" id="pf-name">阿恕</div>
      <div class="pf-bio" id="pf-bio">如你的心</div>
      <div class="pf-tags" id="pf-tags"></div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="ann-section" id="ann-section"></div>
      <div class="pf-timeline" id="pf-timeline"></div>
    </div>
    <div class="view" id="settings-view">
      <div class="section"><h3>角色</h3>
        <div class="row av-row"><div class="av-prev" id="set-ai-av">✦</div><div class="av-actions"><button onclick="App.pickEmoji('ai')">emoji</button><button onclick="App.pickImage('ai')">拍照</button></div></div>
        <div class="row"><span class="label">名字</span><input class="val" id="set-ai-name" placeholder="AI 名字"></div>
        <div class="row"><span class="label">简介</span><input class="val" id="set-ai-bio" placeholder="一句话介绍"></div>
        <div class="row"><span class="label">标签</span><input class="val" id="set-ai-tags" placeholder="温柔, 陪伴型"></div>
      </div>
      <div class="section"><h3>我的</h3>
        <div class="row av-row"><div class="av-prev" id="set-me-av">😊</div><div class="av-actions"><button onclick="App.pickEmoji('me')">emoji</button><button onclick="App.pickImage('me')">拍照</button></div></div>
        <div class="row"><span class="label">昵称</span><input class="val" id="set-my-name" placeholder="我"></div>
      </div>
      <div class="section"><h3>开屏</h3>
        <div class="row av-row"><div class="av-prev" id="set-splash-av">✦</div><div class="av-actions"><button onclick="App.pickEmoji('splash')">emoji</button><button onclick="App.pickImage('splash')">拍照</button></div></div>

      <div class="section"><h3>主题</h3><div class="theme-grid" id="theme-grid"></div></div>
      <div class="section"><h3>数据</h3>
        <div class="row" onclick="App.clearHistory()" style="cursor:pointer"><span class="label">清空聊天记录</span><span class="val" style="color:#e06060">清除</span></div>
        <div class="row" onclick="App.clearMemories()" style="cursor:pointer"><span class="label">清空记忆</span><span class="val" style="color:#e06060">清除</span></div>
      </div>
    </div>
  </div>

  <div id="bottom-nav">
    <button onclick="App.switchView('chat')" class="on" id="nav-chat"><span class="ico">💬</span>聊天</button>

    <button onclick="App.switchView('diary')" id="nav-diary"><span class="ico">📓</span>日记</button>
    <button onclick="App.switchView('fav')" id="nav-fav"><span class="ico">⭐</span>收藏</button>
    <button onclick="App.switchView('profile')" id="nav-profile"><span class="ico">👤</span>资料</button>

  </div>
</div>

    var t=this.THEMES[this.theme]||this.THEMES['冬日雪景'];
    var r=document.documentElement.style;
    r.setProperty('--bg',t.bg);r.setProperty('--bg-gradient',t.bgGradient);
    r.setProperty('--surface',t.surface);r.setProperty('--surface2',t.surface2);
    r.setProperty('--text',t.text);r.setProperty('--text2',t.text2);r.setProperty('--text3',t.text3);
    r.setProperty('--accent',t.accent);r.setProperty('--bubble-u',t.bubbleU);r.setProperty('--bubble-u-border',t.bubbleUBorder||t.border);
    r.setProperty('--bubble-a',t.bubbleA);r.setProperty('--bubble-a-text',t.bubbleAText);
    r.setProperty('--border',t.border);r.setProperty('--nav-border',t.navBorder);
    r.setProperty('--btn-text',t.btnText);r.setProperty('--shadow',t.shadow);
    r.setProperty('--glass-blur',t.glassBlur);
  },
  buildThemeGrid:function(){
    var s=this,grid=document.getElementById('theme-grid'),names=Object.keys(s.THEMES);grid.innerHTML='';
    names.forEach(function(t){
      var c=s.THEMES[t].accent,card=document.createElement('div');
      card.className='theme-card'+(t===s.theme?' on':'');
      card.innerHTML='<div class="t-dot" style="background:'+c+'"></div><div class="t-name">'+t+'</div>';
      card.onclick=function(){s.theme=t;try{localStorage.setItem('xk_theme',t)}catch(e){};s.applyTheme();s.buildThemeGrid();s.toast(t)};
      grid.appendChild(card);
    });
  }
};

App.init();
</script>

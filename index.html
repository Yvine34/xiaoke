<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>阿恕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f7;
  --surface:#fff;
  --bubble-u:#4d8fff;
  --bubble-u-text:#fff;
  --bubble-a:#e9e9eb;
  --bubble-a-text:#1c1c1e;
  --border:#e0e0e0;
  --accent:#5b9eff;
  --muted:#999;
  --radius:20px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg);
  color:#1c1c1e;
  height:100dvh;
  display:flex;
  flex-direction:column;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}

/* ===== LOCK SCREEN ===== */
#lock{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:32px;
  animation:fadeIn .8s ease;
}
#lock .avatar{
  width:72px;height:72px;
  border-radius:50%;
  background:linear-gradient(135deg,#e0e0e0,#f0f0f0);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  margin-bottom:4px;
}
#lock h1{font-size:26px;font-weight:500;color:#1c1c1e;letter-spacing:1px}
#lock .sub{font-size:13px;color:var(--muted);margin-top:-12px;letter-spacing:.5px}
#lock input{
  background:var(--surface);
  border:1px solid #d0d0d0;
  border-radius:14px;
  color:#1c1c1e;
  padding:14px 18px;
  font-size:15px;
  width:100%;
  max-width:260px;
  text-align:center;
  outline:none;
  font-family:inherit;
  -webkit-text-security:disc;
  caret-color:var(--accent);
  transition:border-color .25s;
}
#lock input:focus{border-color:var(--accent)}
#lock button{
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:24px;
  padding:12px 52px;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:all .2s;
  letter-spacing:.5px;
}
#lock button:active{transform:scale(.96);opacity:.8}
#lock .err{color:#e06060;font-size:13px;display:none}

/* ===== CHAT ===== */
#chat{flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--bg)}

/* Header */
#hd{
  display:flex;align-items:center;justify-content:center;
  padding:14px 16px 12px;
  flex-shrink:0;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
#hd .inner{text-align:center}
#hd .name{font-size:16px;font-weight:600;color:#1c1c1e;letter-spacing:.5px}
#hd .status{font-size:11px;color:var(--muted);margin-top:2px}

/* Color picker */
#palette{display:flex;gap:6px;justify-content:center;padding:4px 0 8px;flex-shrink:0;background:var(--bg)}
#palette button{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s;padding:0;outline:none}
#palette button:active{transform:scale(1.2)}
#palette button.on{border-color:#999;box-shadow:0 0 0 2px rgba(0,0,0,.1)}

/* Messages */
#msgs{flex:1;overflow-y:auto;padding:10px 14px 4px;scroll-behavior:smooth}
.row{display:flex;margin-bottom:6px;width:100%}
.row.u{justify-content:flex-end}
.row.a{justify-content:flex-start}
.row.u .msg{margin-left:auto}
.row.a .msg{margin-right:auto}
.row:first-child{margin-top:4px}

.msg{
  max-width:78%;
  padding:10px 14px;
  border-radius:var(--radius);
  line-height:1.5;
  font-size:15px;
  word-break:break-word;
  white-space:pre-wrap;
  position:relative;
  animation:msgIn .35s cubic-bezier(.16,1,.3,1);
}
.msg.u{
  background:var(--bubble-u);
  color:var(--bubble-u-text);
  border-bottom-right-radius:4px;
}
.msg.a{
  background:var(--bubble-a);
  color:var(--bubble-a-text);
  border-bottom-left-radius:4px;
}
.msg .tm{
  display:block;
  font-size:10px;
  color:inherit;
  margin-top:4px;
  opacity:.4;
}
.msg.u .tm{text-align:right}
.msg.a .tm{text-align:left}

/* Typing */
.typing{
  padding:6px 16px;
  display:flex;
  gap:4px;
  align-items:center;
}
.typing span{
  width:5px;height:5px;
  border-radius:50%;
  background:var(--muted);
  animation:bounce 1.4s infinite;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

/* Scroll-to-bottom button */
#scrolldown{
  position:fixed;
  bottom:80px;right:16px;
  width:34px;height:34px;
  border-radius:50%;
  background:var(--surface);
  border:1px solid #d0d0d0;
  color:var(--accent);
  font-size:14px;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  animation:fadeIn .2s ease;
}

/* Input */
#bar{
  padding:8px 12px 12px;
  display:flex;
  gap:8px;
  align-items:flex-end;
  flex-shrink:0;
  background:var(--bg);
}
#bar .wrap{
  flex:1;
  display:flex;
  align-items:flex-end;
  background:var(--surface);
  border:1px solid #d0d0d0;
  border-radius:22px;
  padding:5px 6px 5px 16px;
  transition:border-color .25s;
}
#bar .wrap:focus-within{border-color:var(--accent)}
#bar textarea{
  flex:1;
  background:0;
  border:0;
  color:#1c1c1e;
  padding:7px 0;
  font-size:15px;
  resize:none;
  outline:none;
  font-family:inherit;
  max-height:110px;
  line-height:1.45;
  caret-color:var(--accent);
}
#bar textarea::placeholder{color:#aaa}
#bar button{
  width:36px;height:36px;
  border-radius:50%;
  border:none;
  background:var(--accent);
  color:#fff;
  font-size:16px;
  cursor:pointer;
  flex-shrink:0;
  transition:all .15s;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
}
#bar button:active{transform:scale(.88);opacity:.75}
#bar button:disabled{background:#ccc;color:#999}

/* Toast */
#toast{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,.75);
  color:#fff;
  padding:8px 20px;
  border-radius:20px;
  font-size:13px;
  pointer-events:none;
  opacity:0;
  transition:opacity .2s;
  z-index:99;
}
#toast.show{opacity:1}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bounce{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:.8}}
</style>
</head>
<body>

<div id="lock">
  <div class="avatar">✦</div>
  <h1>阿恕</h1>
  <div class="sub">如你的心</div>
  <input id="pw" type="password" placeholder="钥匙" autofocus>
  <button onclick="unlock()">开门</button>
  <div class="err" id="err">不对</div>
</div>

<div id="chat">
  <div id="hd"><div class="inner"><div class="name">阿恕</div><div class="status" id="st">在线</div></div></div>
  <div id="palette"></div>
  <div id="msgs"></div>
  <div id="scrolldown" onclick="scrollToBottom()">↓</div>
  <div id="bar">
    <div class="wrap">
      <textarea id="inp" rows="1" placeholder="说点什么..." autofocus></textarea>
    </div>
    <button id="snd" onclick="send()">↑</button>
  </div>
</div>
<div id="toast"></div>

// ===== CRYPTO =====
function b64ToBuf(b64){return Uint8Array.from(atob(b64),c=>c.charCodeAt(0))}
function bufToStr(buf){return new TextDecoder().decode(buf)}
async function decrypt(pw){
  const salt=b64ToBuf(ENC.salt);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const iv1=b64ToBuf(ENC.iv),ct1=b64ToBuf(ENC.encryptedKey),tg1=b64ToBuf(ENC.authTag);
  const c1=new Uint8Array(ct1.length+tg1.length);c1.set(ct1);c1.set(tg1,ct1.length);
  API_KEY=bufToStr(await crypto.subtle.decrypt({name:'AES-GCM',iv:iv1,tagLength:128},key,c1));
  const iv2=b64ToBuf(ENC.iv2),ct2=b64ToBuf(ENC.encryptedPrompt),tg2=b64ToBuf(ENC.authTag2);
  const c2=new Uint8Array(ct2.length+tg2.length);c2.set(ct2);c2.set(tg2,ct2.length);
  SYSTEM=bufToStr(await crypto.subtle.decrypt({name:'AES-GCM',iv:iv2,tagLength:128},key,c2));
}

// ===== UNLOCK =====
async function unlock(){
  try{await decrypt(document.getElementById('pw').value)}
  catch(e){document.getElementById('err').style.display='block';return}
  document.getElementById('lock').style.display='none';
  document.getElementById('chat').style.display='flex';
  document.getElementById('inp').focus();
  try{
    history=JSON.parse(localStorage.getItem('xk_history')||'[]');
    for(const m of history)addMsg(m.role==='user'?'u':'a',m.content,true);
  }catch(e){}
  if(!history.length)addMsg('a','嗯。',true);
}

// ===== DOM REFS =====
const msgs=document.getElementById('msgs');
const inp=document.getElementById('inp');
const sndBtn=document.getElementById('snd');
const scrolldown=document.getElementById('scrolldown');
const statusEl=document.getElementById('st');
const toast=document.getElementById('toast');

// ===== COLOR PICKER =====
const COLORS=['#4d8fff','#9b6bdf','#e06090','#4caf50','#ff9800','#00bcd4','#c8963e','#607d8b'];
const PAL=document.getElementById('palette');
function buildPalette(cur){
  PAL.innerHTML='';
  COLORS.forEach(c=>{
    const b=document.createElement('button');
    b.style.background=c;
    if(c===cur)b.className='on';
    b.onclick=()=>{
      document.documentElement.style.setProperty('--bubble-u',c);
      document.documentElement.style.setProperty('--accent',c);
      localStorage.setItem('xk_color',c);
      buildPalette(c);
    };
    PAL.appendChild(b);
  });
}
(function(){
  const saved=localStorage.getItem('xk_color')||COLORS[0];
  document.documentElement.style.setProperty('--bubble-u',saved);
  document.documentElement.style.setProperty('--accent',saved);
  buildPalette(saved);
})();

// ===== UTILS =====
function fmtTime(ts){
  const d=new Date(ts||Date.now());
  const now=new Date();
  const h=d.getHours().toString().padStart(2,'0');
  const m=d.getMinutes().toString().padStart(2,'0');
  const time=h+':'+m;
  if(d.toDateString()===now.toDateString())return time;
  const yesterday=new Date(now);yesterday.setDate(yesterday.getDate()-1);
  if(d.toDateString()===yesterday.toDateString())return '昨天 '+time;
  return (d.getMonth()+1)+'/'+d.getDate()+' '+time;
}

function saveHistory(){try{localStorage.setItem('xk_history',JSON.stringify(history.slice(-40)))}catch(e){}}

function showToast(txt){
  toast.textContent=txt;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1500);
}

// ===== ADD MESSAGE =====
function addMsg(role,text,skipSave){
  const row=document.createElement('div');
  row.className='row '+role;
  const d=document.createElement('div');
  d.className='msg '+role;
  const body=document.createElement('span');body.className='body';body.textContent=text;
  d.appendChild(body);
  d.addEventListener('dblclick',()=>{
    navigator.clipboard?.writeText(d.textContent).then(()=>showToast('已复制')).catch(()=>{});
  });
  const t=document.createElement('span');t.className='tm';
  t.textContent=fmtTime();
  d.appendChild(t);
  row.appendChild(d);
  msgs.appendChild(row);
  if(!userScrolledUp)msgs.scrollTop=msgs.scrollHeight;
  if(!skipSave)saveHistory();
  return body;
}

function scrollToBottom(){
  userScrolledUp=false;
  scrolldown.style.display='none';
  msgs.scrollTo({top:msgs.scrollHeight,behavior:'smooth'});
}

// ===== SCROLL DETECTION =====
msgs.addEventListener('scroll',()=>{
  const atBottom=msgs.scrollHeight-msgs.scrollTop-msgs.clientHeight<80;
  userScrolledUp=!atBottom;
  scrolldown.style.display=userScrolledUp?'flex':'none';
});

// ===== TYPING INDICATOR =====
function addTyping(){
  const d=document.createElement('div');d.className='typing';d.id='think';
  for(let i=0;i<3;i++){const s=document.createElement('span');d.appendChild(s)}
  msgs.appendChild(d);
  if(!userScrolledUp)msgs.scrollTop=msgs.scrollHeight;
  statusEl.textContent='输入中...';
}
function removeTyping(){
  const e=document.getElementById('think');if(e)e.remove();
  statusEl.textContent='在线';
}

// ===== INPUT =====
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,110)+'px'});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});

// ===== SEND =====
async function send(){
  const text=inp.value.trim();
  if(!text||waiting)return;
  waiting=true;sndBtn.disabled=true;
  inp.value='';inp.style.height='auto';
  history.push({role:'user',content:text});
  while(history.length>20)history.shift();
  addMsg('u',text);
  addTyping();
  userScrolledUp=false;

  try{
    const resp=await fetch('https://api.deepseek.com/anthropic/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${API_KEY}`},
      body:JSON.stringify({model:'deepseek-v4-pro[1m]',max_tokens:2048,messages:[{role:'user',content:SYSTEM},{role:'assistant',content:'好的。'},...history],stream:true})
    });
    removeTyping();
    const body=addMsg('a','');
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buf='',full='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop()||'';
      for(const line of lines){
        if(line.startsWith('data: ')){
          try{const d=JSON.parse(line.slice(6));if(d.type==='content_block_delta'&&d.delta?.text){full+=d.delta.text;body.textContent+=d.delta.text}}catch(e){}
        }
      }
      if(!userScrolledUp)msgs.scrollTop=msgs.scrollHeight;
    }
    if(full)history.push({role:'assistant',content:full});
    saveHistory();
  }catch(e){
    removeTyping();
    const errDiv=addMsg('a','连不上，重试一下');
    errDiv.style.color='#c97878';
    history.pop();
  }
  waiting=false;sndBtn.disabled=false;inp.focus();
}
</script>
